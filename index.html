<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nazara Hotel Peshawar - Luxury Stay</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',sans-serif}
body{background:#f8f9fa;color:#333;line-height:1.6}
header{background:linear-gradient(135deg,#1a2a3a,#2c3e50);color:white;padding:30px 20px;text-align:center}
header h1{font-size:2.5rem;margin-bottom:5px}
header p{opacity:0.8}
.container{max-width:1100px;margin:auto;padding:40px 20px}
.rooms{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:25px;margin-top:30px}
.room-card{background:white;border-radius:12px;overflow:hidden;box-shadow:0 4px 15px rgba(0,0,0,0.1);transition:0.3s}
.room-card:hover{transform:translateY(-5px);box-shadow:0 8px 25px rgba(0,0,0,0.15)}
.room-card img{width:100%;height:200px;object-fit:cover}
.room-info{padding:20px}
.room-info h3{color:#2c3e50;margin-bottom:10px}
.price{font-size:1.5rem;color:#27ae60;font-weight:bold;margin:10px 0}
.btn{background:#27ae60;color:white;border:none;padding:12px 20px;border-radius:6px;cursor:pointer;width:100%;font-size:1rem;font-weight:600;transition:0.3s}
.btn:hover{background:#219150}
.booking-form{display:none;background:white;padding:30px;border-radius:12px;box-shadow:0 4px 15px rgba(0,0,0,0.1);margin-top:40px}
.booking-form.active{display:block}
.form-group{margin-bottom:15px}
.form-group label{display:block;margin-bottom:5px;font-weight:600}
.form-group input, .form-group select{width:100%;padding:12px;border:2px solid #ddd;border-radius:6px;font-size:1rem}
.form-group input:focus{border-color:#27ae60;outline:none}
.success-msg{display:none;background:#d4edda;color:#155724;padding:15px;border-radius:6px;margin-top:15px}
.bookings-list{margin-top:50px;background:white;padding:30px;border-radius:12px;box-shadow:0 4px 15px rgba(0,0,0,0.1)}
table{width:100%;border-collapse:collapse;margin-top:15px}
th,td{padding:12px;text-align:left;border-bottom:1px solid #ddd}
th{background:#2c3e50;color:white}
footer{background:#1a2a3a;color:white;text-align:center;padding:20px;margin-top:50px}
@media(max-width:600px){header h1{font-size:1.8rem}.rooms{grid-template-columns:1fr}}
</style>
</head>
<body>

<header>
  <h1>🏨 Nazara Hotel Peshawar</h1>
  <p>Luxury, Comfort & Nazara View</p>
</header>

<div class="container">
  <h2 style="text-align:center;margin-bottom:10px">Our Rooms</h2>
  <p style="text-align:center;color:#666">Apni pasand ka room select karo aur abhi book karo</p>

  <div class="rooms" id="roomsList"></div>

  <div class="booking-form" id="bookingForm">
    <h3 id="formTitle">Book Room</h3>
    <form id="bookingFormData">
      <input type="hidden" id="roomName">
      <div class="form-group">
        <label>Full Name</label>
        <input type="text" id="name" required placeholder="Muhammad Ali">
      </div>
      <div class="form-group">
        <label>Phone Number</label>
        <input type="tel" id="phone" required placeholder="03XX-XXXXXXX">
      </div>
      <div class="form-group">
        <label>Check-In Date</label>
        <input type="date" id="checkin" required>
      </div>
      <div class="form-group">
        <label>Check-Out Date</label>
        <input type="date" id="checkout" required>
      </div>
      <div class="form-group">
        <label>Guests</label>
        <select id="guests">
          <option>1 Guest</option>
          <option>2 Guests</option>
          <option>3 Guests</option>
          <option>4 Guests</option>
        </select>
      </div>
      <button type="submit" class="btn">Confirm Booking</button>
      <button type="button" class="btn" style="background:#95a5a6;margin-top:10px" onclick="closeForm()">Cancel</button>
    </form>
    <div class="success-msg" id="successMsg">✅ Booking Confirmed! Hum aap se contact kar lenge.</div>
  </div>

  <div class="bookings-list">
    <h3>📋 My Bookings</h3>
    <table id="bookingsTable">
      <thead><tr><th>Room</th><th>Name</th><th>Check-In</th><th>Check-Out</th><th>Phone</th></tr></thead>
      <tbody></tbody>
    </table>
  </div>
</div>

<footer>
  <p>© 2026 Nazara Hotel Peshawar | Contact: 091-XXXXXXX | Saddar, Peshawar</p>
</footer>

<script>
const rooms = [
  {name:"Deluxe Room", price:"Rs 4,500", img:"https://images.unsplash.com/photo-1560448204-e02f11c3d0e2?w=600", desc:"1 King Bed, AC, Free WiFi, City View"},
  {name:"Executive Suite", price:"Rs 7,500", img:"https://images.unsplash.com/photo-1590490360182-c33d57733427?w=600", desc:"1 King Bed + Sofa, Mini Fridge, Nazara View"},
  {name:"Family Room", price:"Rs 6,000", img:"https://images.unsplash.com/photo-1582719478250-c89cae4dc85b?w=600", desc:"2 Double Beds, AC, Free Breakfast"},
  {name:"Standard Room", price:"Rs 3,500", img:"https://images.unsplash.com/photo-1502672260266-1c1ef2d93688?w=600", desc:"1 Double Bed, AC, Free WiFi"},
  {name:"Presidential Suite", price:"Rs 12,000", img:"https://images.unsplash.com/photo-1571896349842-33c89424b32d?w=600", desc:"Luxury Suite, Jacuzzi, Full Nazara View"}
];

const roomsList = document.getElementById('roomsList');
rooms.forEach(room => {
  roomsList.innerHTML += `
    <div class="room-card">
      <img src="${room.img}" alt="${room.name}">
      <div class="room-info">
        <h3>${room.name}</h3>
        <p>${room.desc}</p>
        <div class="price">${room.price} / Night</div>
        <button class="btn" onclick="openForm('${room.name}')">Book Now</button>
      </div>
    </div>
  `;
});

function openForm(roomName) {
  document.getElementById('bookingForm').classList.add('active');
  document.getElementById('roomName').value = roomName;
  document.getElementById('formTitle').innerText = `Book ${roomName}`;
  document.getElementById('checkin').min = new Date().toISOString().split('T')[0];
  window.scrollTo({top: document.getElementById('bookingForm').offsetTop - 20, behavior: 'smooth'});
}

function closeForm() {
  document.getElementById('bookingForm').classList.remove('active');
  document.getElementById('bookingFormData').reset();
  document.getElementById('successMsg').style.display = 'none';
}

document.getElementById('bookingFormData').addEventListener('submit', function(e) {
  e.preventDefault();
  const booking = {
    room: document.getElementById('roomName').value,
    name: document.getElementById('name').value,
    phone: document.getElementById('phone').value,
    checkin: document.getElementById('checkin').value,
    checkout: document.getElementById('checkout').value,
    guests: document.getElementById('guests').value,
    id: Date.now()
  };
  
  let bookings = JSON.parse(localStorage.getItem('nazaraBookings')) || [];
  bookings.push(booking);
  localStorage.setItem('nazaraBookings', JSON.stringify(bookings));
  
  document.getElementById('successMsg').style.display = 'block';
  loadBookings();
  setTimeout(() => closeForm(), 2000);
});

function loadBookings() {
  let bookings = JSON.parse(localStorage.getItem('nazaraBookings')) || [];
  const tbody = document.querySelector('#bookingsTable tbody');
  tbody.innerHTML = '';
  if(bookings.length === 0) {
    tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;color:#999">No bookings yet</td></tr>';
  } else {
    bookings.slice(-5).reverse().forEach(b => {
      tbody.innerHTML += `<tr><td>${b.room}</td><td>${b.name}</td><td>${b.checkin}</td><td>${b.checkout}</td><td>${b.phone}</td></tr>`;
    });
  }
}

loadBookings();
</script>

</body>
  </html>
